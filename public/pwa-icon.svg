<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bladeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#cbd5e1" />
      <stop offset="50%" stop-color="#f8fafc" />
      <stop offset="50%" stop-color="#94a3b8" />
      <stop offset="100%" stop-color="#64748b" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#b45309" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="512" height="512" rx="110" fill="#0f172a"/>
  
  <!-- Glow behind blade -->
  <path d="M256 70 L290 140 L290 340 L222 340 L222 140 Z" fill="#6366f1" filter="url(#glow)" opacity="0.8"/>
  
  <!-- Blade -->
  <path d="M256 80 L280 140 L280 340 L232 340 L232 140 Z" fill="url(#bladeGrad)"/>
  
  <!-- Crossguard -->
  <path d="M170 330 L342 330 L342 360 L170 360 Z" fill="url(#goldGrad)" rx="8"/>
  <path d="M220 330 L292 330 L292 380 L220 380 Z" fill="url(#goldGrad)" rx="4"/>
  
  <!-- Handle -->
  <rect x="240" y="360" width="32" height="80" fill="#334155" rx="4"/>
  <path d="M240 370 L272 380 M240 390 L272 400 M240 410 L272 420 M240 430 L272 440" stroke="#1e293b" stroke-width="4"/>
  
  <!-- Pommel -->
  <circle cx="256" cy="450" r="22" fill="url(#goldGrad)"/>
  <circle cx="256" cy="450" r="12" fill="#fef3c7" opacity="0.5"/>
</svg>
